name: Publish static site to gh-pages

on:
  push:
    branches:
      - main
    paths:
      - mobile_search/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish mobile_search to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git subtree split --prefix mobile_search -b gh-pages-deploy
          git push --force origin gh-pages-deploy:gh-pages
